
trigger: none

pool: infra-pool

steps: 
- task: TerraformTask@5
  inputs:
    provider: 'azurerm'
    command: 'init'
    workingDirectory: '$(System.DefaultWorkingDirectory)/child parent module/environment/dev'
    backendServiceArm: 'narayanServiceConnection'
    backendAzureRmStorageAccountName: 'test'
    backendAzureRmContainerName: 'tfstate'
    backendAzureRmKey: 'terraform.tfstate'




