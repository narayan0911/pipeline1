
trigger: none

pool: infra-pool

steps: 
- task: TerraformTask@5
  inputs:
    provider: 'azurerm'
    command: 'init'
    workingDirectory: '$(System.DefaultWorkingDirectory)/child parent module'
    backendServiceArm: 'narayanServiceConnection'
    backendAzureRmStorageAccountName: 'test'
    backendAzureRmContainerName: 'tfstate'
    backendAzureRmKey: 'terraform.tfstate'

- task: TerraformTask@5
  inputs:
    provider: 'azurerm'
    command: 'plan'
    workingDirectory: '$(System.DefaultWorkingDirectory)/child parent module'
    environmentServiceNameAzureRM: 'narayanServiceConnection'
- task: TerraformTask@5
  inputs:
    provider: 'azurerm'
    command: 'destroy'
    workingDirectory: '$(System.DefaultWorkingDirectory)/child parent module'
    environmentServiceNameAzureRM: 'narayanServiceConnection'



