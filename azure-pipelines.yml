
trigger: 
- main
# parameters:
#   - name: myMultiString
#     type: string
#     values:
#       - dev
#       - prod

pool: infra-pool

steps: 
- task: TerraformTask@5
  inputs:
    provider: 'azurerm'
    command: 'init'
    workingDirectory: '$(System.DefaultWorkingDirectory)/child parent module/environment/dev'
    backendServiceArm: 'narayanServiceConnection'
    backendAzureRmStorageAccountName: 'mishrastorage'
    backendAzureRmContainerName: 'tfstate'
    backendAzureRmKey: 'pipeline.tfstate'

- task: TerraformTask@5
  inputs:
    provider: 'azurerm'
    command: 'plan'
    workingDirectory: '$(System.DefaultWorkingDirectory)/child parent module/environment/dev'
    environmentServiceNameAzureRM: 'narayanServiceConnection'

- task: TerraformTask@5
  inputs:
    provider: 'azurerm'
    command: 'destroy'
    environmentServiceNameAzureRM: 'narayanServiceConnection'
    workingDirectory: '$(System.DefaultWorkingDirectory)/child parent module/environment/dev'



