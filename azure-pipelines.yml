
trigger: none

parameters:
  - name: environment
    type: string
    values:
      - dev
      - prod

variables:
- name: workingDirectory 
  value: '$(System.DefaultWorkingDirectory)/child parent module/environment/${parameters.environment}'
- name: backendServiceArm
  value: 'narayanServiceConnection'
- name: backendAzureRmStorageAccountName
  value: 'mishrastorage'
- name:  backendAzureRmContainerName 
  value: 'tfstate'
- name: backendAzureRmKey
  value: 'pipeline.tfstate'  

pool: infra-pool

steps: 
- task: TerraformTask@5
  inputs:
    provider: 'azurerm'
    command: 'init'
    workingDirectory: '${workingDirectory}'
    backendServiceArm: '${backendServiceArm}'
    backendAzureRmStorageAccountName: '${backendAzureRmStorageAccountName}'
    backendAzureRmContainerName: '${backendAzureRmContainerName}'
    backendAzureRmKey: '${backendAzureRmKey}'

- task: TerraformTask@5
  inputs:
    provider: 'azurerm'
    command: 'plan'
    workingDirectory: '${workingDirectory}'
    environmentServiceNameAzureRM: 'narayanServiceConnection'



